# Production-oriented messaging infrastructure.
# Local development: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: eda-rabbitmq
    hostname: eda-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?Set RABBITMQ_USER in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?Set RABBITMQ_PASS in .env}
      RABBITMQ_APP_USER: ${RABBITMQ_APP_USER:?Set RABBITMQ_APP_USER in .env}
      RABBITMQ_APP_PASS: ${RABBITMQ_APP_PASS:?Set RABBITMQ_APP_PASS in .env}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    mem_limit: 512m
    cpus: 1.0
    networks:
      - eda-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq-init:
    image: curlimages/curl:8.12.1
    container_name: eda-rabbitmq-init
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:?Set RABBITMQ_USER in .env}
      RABBITMQ_PASS: ${RABBITMQ_PASS:?Set RABBITMQ_PASS in .env}
      RABBITMQ_APP_USER: ${RABBITMQ_APP_USER:?Set RABBITMQ_APP_USER in .env}
      RABBITMQ_APP_PASS: ${RABBITMQ_APP_PASS:?Set RABBITMQ_APP_PASS in .env}
    volumes:
      - ./infra/rabbitmq/init.sh:/init/init.sh:ro
      - ./infra/rabbitmq/definitions.json:/init/definitions.json:ro
    entrypoint: ["/bin/sh", "/init/init.sh"]
    networks:
      - eda-network
    restart: "no"

  kafka:
    image: apache/kafka:3.8.1
    container_name: eda-kafka
    hostname: kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_NETWORK_THREADS: 3
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    mem_limit: 1g
    cpus: 2.0
    networks:
      - eda-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  kafka-init:
    image: apache/kafka:3.8.1
    container_name: eda-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:9092
      KAFKA_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-1}
      KAFKA_MIN_INSYNC_REPLICAS: ${KAFKA_MIN_INSYNC_REPLICAS:-1}
      KAFKA_RETENTION_MS: ${KAFKA_RETENTION_MS:-604800000}
    volumes:
      - ./infra/kafka/init-topics.sh:/init/init-topics.sh:ro
    entrypoint: ["/bin/bash", "/init/init-topics.sh"]
    networks:
      - eda-network
    restart: "no"

volumes:
  rabbitmq_data:
  kafka_data:

networks:
  eda-network:
    driver: bridge
