# Topology is imported at runtime by rabbitmq-init (see infra/rabbitmq/init.sh).
# Memory and disk safeguards — stop publishers before the broker crashes.
vm_memory_high_watermark.relative = 0.6
disk_free_limit.absolute = 2GB

# Spread quorum queue leaders evenly when clustered.
queue_leader_locator = balanced

# Prometheus metrics (port 15692, internal network only).
prometheus.return_per_object_metrics = true
